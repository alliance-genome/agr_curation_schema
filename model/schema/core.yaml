id: https://github.com/alliance-genome/agr_curation_schema/core.yaml
name: core
description: Alliance Schema with LinkML

default_prefix: alliance
default_range: string

default_curi_maps:
  - obo_context
  - idot_context
  - semweb_context
  - monarch_context

emit_prefixes:
  - rdf
  - rdfs
  - xsd

imports:
  - linkml:types
  - reference
  - resource
  - agent
  - image
  - ontologyTerm
  - controlledVocabulary

prefixes:
  alliance: 'http://alliancegenome.org/'
  linkml: 'https://w3id.org/linkml/'
  gff: 'https://w3id.org/gff'
  faldo: 'http://biohackathon.org/resource/faldo#'
  biolink: 'https://w3id.org/biolink/vocab/'
  NLMID: 'https://www.ncbi.nlm.nih.gov/nlmcatalog/?term='
  schema: 'http://schema.org/'
  dct: 'http://purl.org/dc/terms/'
  WIKIDATA_PROPERTY: 'https://www.wikidata.org/wiki/Property:'
  obograph: 'https://github.com/biodatamodels/obograph'

## ------------
## TYPES
## ------------

types:

  biological_sequence:
    typeof: string

## ------------
## CLASSES
## ------------


classes:

  AuditedObject:
    description: >-
      Base class for all other LinkML classes. Some entity for which changes are tracked,
      including date/time of change, the agent responsible for the change, and whether
      the entity is internal (private).
    slots:
      - created_by
      - date_created
      - modified_by
      - date_updated
      - internal
      - obsolete

  BiologicalEntity:
    is_a: AuditedObject
    description: >-
      An entity of biological origin that can be unambiguously attributed to
      a single species.
    abstract: true
    slots:
      - curie
      - taxon
    slot_usage:
      taxon:
        required: true

  GenomicEntity:
    is_a: BiologicalEntity
    description: >-   # tentative
      An entity that is part of a genome (i.e. segment of the DNA molecule),
      is derived directly from the genome (i.e. RNA transcript molecule), or
      is derived indirectly from the genome (i.e. polypeptide or protein via
      RNA transcript translation).
    slots:
      - symbol
      - name
      - synonyms
      - cross_references
      - secondary_identifiers
      - genomic_locations

  Transcript:
    is_a: GenomicEntity
    description: >-
      Placeholder.
    id_prefixes:
      - ENSEMBL
      - FB
      - WB
      - MGI
      - RGD
      - SGD
      - ZFIN

  Gene:
    description: >-
      A DNA genomic entity from which one or more functional* RNA transcript molecules
      are transcribed, along with cis-regulatory elements responsible for regulating
      expression (transcription) of the gene. * A functional RNA molecule
      here can mean one that is directly responsible for the gene's function (e.g. catalysis,
      structure, etc.) or one that is translated to produce a functional polypeptide/protein.
      A pseudogene may be considered a gene under this definition, albeit no longer functional.
    is_a: GenomicEntity
    slots:
      - gene_synopsis
      - gene_synopsis_URL
      - gene_type
      - automated_gene_description
    id_prefixes:
      - ENSEMBL
      - HGNC
      - FB
      - MGI
      - RGD
      - SGD
      - WB
      - ZFIN
    slot_usage:
      symbol:
        required: true

  CrossReference:
    is_a: AuditedObject
    slots:
      - curie
      - page_areas
      - display_name
      - prefix
    defining_slots:
      - curie
      - page_areas

  Synonym:
    is_a: AuditedObject
    description: >-
      Some symbol or name that is used to refer to an object. It can be the
      primary/current/accepted symbol/name, or an alias.
    slots:
      - synonym_type
      - format_name
      - display_name

  Note:
    is_a: AuditedObject
    description: >-
      Note object for capturing free-text describing some attribute of an entity,
      coupled with a 'note type', internal boolean, and an optional list of
      references. Permissible values for 'note_type' currently = disease_summary, disease_note
    slots:
      - free_text
      - note_type
      - references
    slot_usage:
      free_text:
        required: true
      note_type:              # Permissible values currently: disease_summary, disease_note
        required: true

  EntityStatement:    # to be deprecated in favor of Note class?
    is_a: AuditedObject
    description: >-
      Free-text describing some aspect of an entity.
    slots:
      - statement_subject
      - statement_type
      - statement_text
      - references

  Association:
    is_a: AuditedObject
    description: >-
      A typed association between two entities, supported by evidence.
    close_mappings:
      - biolink:association
    notes:
      Keeping this more generic than biolink:association by foregoing the
      qualifiers and negated slots.
    slots:
      - subject
      - predicate
      - object

  # SYNONYM DEV
  EntitySynonym:
    is_a: Association
    description: >-
      A relationship between an entity and a synonym.
    notes: >-
      An alternative to the synonyms slot that allows for evidence in support
      of the entity-synonym association.
      It is not clear what the predicate should be.
    slot_usage:
      object:
        range: Synonym
      references:
        description: >-
          The references in which the synonym is used to refer to the entity.

  ExternalDatabaseLink:
    is_a: AuditedObject
    description: >-
      Base relation that holds the identifier prefix, base url and url suffix to help in generating
      URLs in crossReferences.
    slots:
      - dbkey
      - prefix
      - url_prefix
      - url_suffix
      - prefix_page
      - prefix_order

  Chromosome:
    is_a: AuditedObject
    description: The ID of the landmark used to establish the coordinate system for the current feature.
    slots:
      - curie

  Assembly:
    is_a: AuditedObject
    slots:
      - curie

  GenomicLocation:
    is_a: AuditedObject
    slots:
      - subject
      - predicate   # what should the predicate range be for this class? CG
      - object
      - has_assembly
      - start
      - end
    slot_usage:
      subject:
        range: GenomicEntity
        description: >-
          subject should be a genomic entity
      object:
        range: Chromosome
        description: >-
          object should be the chromosome identifier
    defining_slots:
      - subject
      - predicate
      - object
      - has_assembly
      - start
      - end

  Protein:
    is_a: GenomicEntity

## ------------
## SLOTS
## ------------



slots:

  # SYNONYM DEV
  format_name:
    description: >-
      A version of a symbol/name string using only ASCII characters that is
      easier to type, print and parse. For example, Greek characters would be
      transliterated.
    domain: Synonym
    range: string
    required: true
    multivalued: false

  display_name:
    description: >-
      A version of a symbol/name string for display. Any UTF8 character is
      permitted. Use HTML to represent sub/superscripts.
    range: string
    required: true
    multivalued: false

  synonym_type:
    domain: Synonym
    range: synonym_type_set
    multivalued: false
    required: true

  start:
    description: The start of the feature in positive 1-based integer coordinates

  end:
    description: The end of the feature in positive 1-based integer coordinates

  has_assembly:
    domain: GenomicLocation
    required: true
    range: Assembly

  prefix:
    required: true
    multivalued: false
    description: >-
      Denormalization to help with classifying types of crossReferences,
      distinguishing DOIs from PMC ids, etc.

  page_areas:
    required: true
    multivalued: true
    range: string

  curator_comment:
    description: >-
      A publicly visible explanatory note from curators about some entity.
    range: string

  url_prefix:
    description: >-
      The prefix of the url before the accession number.

  url_suffix:
    description: >-
      The suffix of the url after the accession number.

  prefix_order:
    description: >-
      The relative order of the resource when listed with other crossReferences.

  prefix_page:
    description: >-
      The cateogry of pages the resource in the context of the URL associated with the crossReference
      provides.  Equivalent to the 'page' attribute in the Alliance resourceDescriptor file.

  private_comment:
    description: >-
      A private explanatory note from curators about some entity, for internal
      use only.
    range: string

  uncertain:
    description: >-
      If set to true, then the related entity is uncertain.
    range: boolean

  free_text:
    description: >-
      A free text string that describes some aspect of an entity.
    range: string

  note_type:
    description: >-
      The type of note: e.g., cytology, comment, summary. Permissible values for 'note_type' currently = disease_summary, disease_note
    range: VocabularyTerm

  internal:
    description: >-
      Classifies the entity as private (for internal use) or not (for public use).
    notes: >-
      Default value is true.
    range: boolean
    required: true

  related_notes:
    description: Holds between an object and a list of related Note objects.
    notes: >-
      The original name suggested for this slot was simply notes, but I think
      that label is reserved in LinkML for internal descriptions of objects,
      hence the related_notes label used here.
    range: Note
    multivalued: true

  related_note:
    description: Holds between an object and a Note object.
    notes: >-
      Singular version of related_notes
    range: Note
    multivalued: false

  statement_subject:
    description: >-
      The entity being described by the note.
    domain: EntityStatement

  statement_type:
    description: >-
      The type of free-text statement. For example: cytology, private,
      curator_comments.
    notes: >-
      Note types listed here as having range string, but should probably be
      constrained to specific enum sets depending on the entity type.
    domain: EntityStatement
    range: string

  statement_text:
    description: >-
      Free-text describing some aspect of an entity.
    domain: EntityStatement
    range: string

  generated_by:
    description: >-
      Holds between a material entity and an Agent that generated it:
      e.g., Thomas Blumenthal, Kornberg Laboratory.
    required: false
    multivalued: true
    range: Agent

  manufactured_by:
    description: >-
      Holds between a material entity and an Agent that has manufactured it:
      e.g., Molecular Probes.
    required: false
    multivalued: true
    range: Agent

  current:
    range: boolean

  curie:
    identifier: true
    required: true
    multivalued: false
    description: >-
      A unique identifier for a thing. Must be either a CURIE shorthand for a URI or a complete URI
    range: uriorcurie

  unique_id:
    description: >-
      A non-curie unique identifier for a thing.
    multivalued: false
    range: string

  dbkey:
    description: >-
      Typically the primary key on the table.  Should be a global sequence in the database to insure
      uniqueness over the entire suite of tables.  Alternatively, could be a serial8 identifier.
      Tables with a dbkey should have an alternate key to establish uniqueness based on the data in the table.

  taxon:
    description: >-
      The taxon from which the biological entity derives.
    multivalued: false
    range: NCBITaxonTerm

  secondary_identifiers:
    aliases: ['secondary_ids']
    multivalued: true
    range: uriorcurie

  gene_synopsis:
    description: >-
      Gene description provided by source resource (ie: MOD gene description that is curated or
      automated via MOD internal processes).

  gene_synopsis_URL:
    description: >-
      Gene description reference URL provided by source resource (aka: MOD) in the case
      where the curated gene_synopsis has a reference URL outside of the MOD.

  automated_gene_description:
    description: >-
      Gene description generated via algorithm developed at the alliance.

  genomic_locations:
    domain: GenomicEntity
    range: GenomicLocation
    multivalued: true

  table_key:
    description: >-
      The primary key for a specific table entry, unique for that table.
    notes: >-
      For internal use.
    multivalued: false
    range: integer

  date_created:
    aliases: [ 'creation_date' ]
    description: >-
      The date on which an entity was created. This can be applied to nodes or edges.
    range: date
    exact_mappings:
      - dct:createdOn
      - WIKIDATA_PROPERTY:P577

  date_updated:
    aliases: ['date_last_modified']
    description: >-
      Date on which an entity was last modified.
    range: date

  created_by:
    description: >-
      The individual that created the entity.
    multivalued: false
    domain: AuditedObject
    range: Person

  modified_by:
    description: >-
      The individual that last modified the entity.
    multivalued: false
    domain: AuditedObject
    range: Person

  release:
    description: MOD release ID
    range: string

  data_provider:
    description: Organization (e.g. MOD) from which the data was sourced
    multivalued: false
    range: string

  secondary_data_provider:
    description: Organization (e.g. MOD) that provided the data directly to the Alliance, but not the original source
    multivalued: false
    range: string

  association_slot:
    abstract: true
    aliases: ['edge property', 'statement property']
    description: >-
      any slot that relates an association to another entity
    exact_mappings:
      - biolink:association_slot

  description:
    aliases: ['definition']
    description: >-
      a human-readable description of an entity

  name:
    description: >-
      The current/approved full name for a particular thing.
    range: Synonym
    multivalued: false

  symbol:
    description: >-
      The current/approved symbol for a particular thing.
    range: Synonym
    multivalued: false
    exact_mappings:
      - biolink:symbol

  cross_references:
    singular_name: cross_reference
    aliases: ['xrefs']
    description: >-
      Holds between an object and its CrossReferences.
    multivalued: true
    range: CrossReference
    inlined: true
    inlined_as_list: true

  synonyms:
    singular_name: synonym
    description: holds between a named thing and a synonym
    multivalued: true
    range: Synonym

  negated:
    range: boolean
    description: if set to true, then the association is negated i.e. is not true

  qualifiers:
    singular_name: qualifier
    description: >-
      This is the MeSH qualifier term that is optionally added to the descriptor term.

  type:
    range: uriorcurie

  gene_type:
    description: SOTerm describing gene type
    domain: Gene
    range: SOTerm

  references:
    singular_name: reference
    description: holds between an object and a list of references
    multivalued: true
    range: Reference

  single_reference:
    description: holds between an object and a single reference
    multivalued: false
    range: Reference

  original_reference:
    is_a: references
    description: >-
      Holds between an entity and the first reference to describe that entity.
    multivalued: false
    range: Reference

  obsolete:
    description: >-
      Entity is no longer current.
    notes: >-
      Obsolete entities are preserved in the database for posterity but should
      not be publicly displayed.
    range: boolean

  abbreviation:
    multivalued: false
    range: string

  mod_entity_id:
    description: >-
      The model organism database (MOD) identifier/curie for the object
    range: string

  first_name:
    description: first name of a person
    range: string

  middle_name:
    description: middle names of a person
    range: string
    multivalued: false

  last_name:
    description: last (family) name of a person
    range: string

  evidence_codes:
    description: ECO term IDs             # this slot has also been instantiated in the orthology.yaml
    multivalued: true
    values_from:
      - ECO
    range: ECOTerm

  evidence_code:
    multivalued: false
    range: ECOTerm

  cron_schedule:
    description: A string describing the cron syntax for the schedule
    range: string

  schedule_active:
    description: This determines if the the schedule is active or not
    range: boolean

## --------------------
## ASSOCIATION SLOTS
## --------------------

  subject:
    is_a: association_slot
    description: >-
      connects an association to the subject of the association.
      For example, in a gene-to-phenotype association, the gene is subject and phenotype is object.
    required: true
    exact_mappings:
      - owl:annotatedSource
      - biolink:subject

  object:
    is_a: association_slot
    description: >-
      connects an association to the object of the association.
      For example, in a gene-to-phenotype association, the gene is subject and phenotype is object.
    required: true
    exact_mappings:
      - biolink:object

  predicate:
    is_a: association_slot
    description: >-
      A high-level grouping for the relationship type. This is analogous to category for nodes.
      In RDF, this corresponds to rdf:predicate and in Neo4j this corresponds to the
      relationship type.
    required: true
    exact_mappings:
      - biolink:predicate

## ----------
## PREDICATES
## ----------

  related_to:                         # should this be generalized in core.yaml?
    description: >-
      A relationship that is asserted between two named things.
    multivalued: true
    inherited: true
    symmetric: true

enums:

  synonym_type_set:
    permissible_values:
      symbol:
        description: >-
          A short string representing an entity, usually an abbreviation.
        notes: >-
          SGD: gene_name (e.g., ABC1)
          WB: Public_name (e.g., abu-9)
          FB: symbol (e.g., wg)
          ZFIN: Symbol (e.g., pax6a)
          MGI: Symbol (e.g., Ace)
          RGD: (e.g., Abat)
      name:
        description: >-
          A longer string representing an entity name in which words usally spelled out in full.
        notes: >-
          If this is implemented, the current name slot might be supplanted by Synonyms of type name.
          SGD: name description
          WB:
          FB: fullname (e.g., wingless)
          ZFIN: name (e.g., paired box 6a)
          MGI: Name (e.g., angiotensin I converting enzyme (peptidyl-dipeptidase A) 1)
          RGD: Name (e.g., 4-aminobutyrate aminotransferase)
      systematic_name:
        notes: >-
          It seems like a few MODS have systematic names, perhaps coming from
          the early days of full genome sequencing.
          Do we want to group them into one type?
          SGD: systematic_name (e.g., YHR084W)
          WB: Sequence_name (e.g., R09F10.2)
          FB: Annotation symbol (e.g., CG4889)
      # Other SGD alias types: distinct from above types?
      NCBI protein name:
      Uniform:
      Non-uniform:
      Retired name:
      SGDID Secondary:
